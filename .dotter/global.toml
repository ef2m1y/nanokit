[helpers]

[default]
depends = []

[default.files]
nvim = { target = "$HOME/.config/nvim", type = "symbolic", recurse = false }
zshenv = "$HOME/.zshenv"
zshrc = "$HOME/.zshrc"
tigrc = "$HOME/.tigrc"
"pixi-global.toml" = "$HOME/.pixi/manifests/pixi-global.toml"
"sheldon.toml" = "$HOME/.config/sheldon/plugins.toml"
"tmux.conf" = "$HOME/.tmux.conf"
"starship.toml" = "$HOME/.config/starship.toml"
"claude/settings.json" = "$HOME/.claude/settings.json"
"claude/CLAUDE.md" = "$HOME/.claude/CLAUDE.md"
"claude/scripts/zotero-mcp-server.sh" = "$HOME/.claude/scripts/zotero-mcp-server.sh"

[default.variables]

[settings]
default_target_type = "symbolic"
recurse = false
