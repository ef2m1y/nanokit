[helpers]

[default]
depends = []

[default.files]
nvim = { target = "$HOME/.config/nvim", type = "symbolic", recurse = false }
zshenv = "$HOME/.zshenv"
zshrc = "$HOME/.zshrc"
tigrc = "$HOME/.tigrc"
"pixi-global.toml" = "$HOME/.pixi/manifests/pixi-global.toml"
"sheldon.toml" = "$HOME/.config/sheldon/plugins.toml"
"tmux.conf" = "$HOME/.tmux.conf"
"starship.toml" = "$HOME/.config/starship.toml"
"claude/settings.json" = "$HOME/.claude/settings.json"
"claude/CLAUDE.md" = "$HOME/.claude/CLAUDE.md"
"claude/scripts/zotero-mcp-server.sh" = "$HOME/.claude/scripts/zotero-mcp-server.sh"
"claude/skills/git-commits" = { target = "$HOME/.claude/skills/git-commits", type = "symbolic" }
"claude/skills/code-comments" = { target = "$HOME/.claude/skills/code-comments", type = "symbolic" }
"claude/skills/code-review-etiquette" = { target = "$HOME/.claude/skills/code-review-etiquette", type = "symbolic" }
"claude/skills/readme-writing" = { target = "$HOME/.claude/skills/readme-writing", type = "symbolic" }
"claude/skills/ai-code-changes" = { target = "$HOME/.claude/skills/ai-code-changes", type = "symbolic" }
"claude/skills/pixi-env" = { target = "$HOME/.claude/skills/pixi-env", type = "symbolic" }
"claude/ccstatusline/settings.json" = "$HOME/.config/ccstatusline/settings.json"

[default.variables]

[settings]
default_target_type = "symbolic"
recurse = false
